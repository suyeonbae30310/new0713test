<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>업종별 기계설비 시각화</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    font-family: "맑은 고딕";
    background:#f5f5f5;
    margin:0;
}

header{
    background:#0066cc;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    width:90%;
    max-width:1300px;
    margin:auto;
}

.card{
    background:white;
    margin-top:20px;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 8px rgba(0,0,0,0.15);
}

select,input{
    padding:10px;
    margin:10px;
    font-size:15px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th{
    background:#0066cc;
    color:white;
}

th,td{
    border:1px solid #ddd;
    padding:8px;
    text-align:left;
}

tbody tr:hover{
    background:#f0f8ff;
}

canvas{
    max-height:500px;
}

</style>

</head>

<body>

<header>

<h1>업종별 기계설비 현황</h1>

</header>

<div class="container">

<div class="card">

<label>업종 선택</label>

<select id="industrySelect">
<option value="전체">전체</option>
</select>

<input
type="text"
id="search"
placeholder="기계설비명 검색">

</div>

<div class="card">

<canvas id="chart"></canvas>

</div>

<div class="card">

<table>

<thead>

<tr>

<th>번호</th>

<th>업종대분류</th>

<th>업종중분류</th>

<th>업종소분류</th>

<th>기계설비명</th>

<th>설명</th>

</tr>

</thead>

<tbody id="tableBody">

</tbody>

</table>

</div>

</div>

<script>

const csvFile="한국산업안전보건공단_업종별 기계설비 목록_20210909.csv";

let allData=[];

let chart;

Papa.parse(csvFile,{

download:true,

header:true,

skipEmptyLines:true,

complete:function(result){

allData=result.data;

createChart(allData);

createSelect(allData);

showTable(allData);

}

});

function createChart(data){

const count={};

data.forEach(row=>{

const key=row["업종대분류"] || "기타";

count[key]=(count[key]||0)+1;

});

const labels=Object.keys(count);

const values=Object.values(count);

const ctx=document.getElementById("chart");

chart=new Chart(ctx,{

type:'bar',

data:{

labels:labels,

datasets:[{

label:"기계설비 개수",

data:values

}]

},

options:{

responsive:true,

plugins:{

legend:{

display:false

}

}

}

});

}

function updateChart(data){

const count={};

data.forEach(row=>{

const key=row["업종대분류"] || "기타";

count[key]=(count[key]||0)+1;

});

chart.data.labels=Object.keys(count);

chart.data.datasets[0].data=Object.values(count);

chart.update();

}

function createSelect(data){

const select=document.getElementById("industrySelect");

const industries=[...new Set(data.map(x=>x["업종대분류"]))];

industries.sort();

industries.forEach(i=>{

if(i){

const option=document.createElement("option");

option.value=i;

option.textContent=i;

select.appendChild(option);

}

});

}

function showTable(data){

const tbody=document.getElementById("tableBody");

tbody.innerHTML="";

data.forEach(row=>{

const tr=document.createElement("tr");

tr.innerHTML=`

<td>${row["번호"]}</td>

<td>${row["업종대분류"]}</td>

<td>${row["업종중분류"]}</td>

<td>${row["업종소분류"]}</td>

<td>${row["기계설비명"]}</td>

<td>${row["기계설비설명"]}</td>

`;

tbody.appendChild(tr);

});

}

function filter(){

const industry=document.getElementById("industrySelect").value;

const keyword=document.getElementById("search").value.toLowerCase();

const filtered=allData.filter(row=>{

const industryOk=(industry==="전체")||(row["업종대분류"]===industry);

const keywordOk=(row["기계설비명"]||"").toLowerCase().includes(keyword);

return industryOk && keywordOk;

});

showTable(filtered);

updateChart(filtered);

}

document.getElementById("industrySelect").addEventListener("change",filter);

document.getElementById("search").addEventListener("keyup",filter);

</script>

</body>

</html>
